version: '3.8'
name: szubp

services:
  mysql-db:
    image: mysql
    container_name: mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  postgres-db:
    image: postgres
    container_name: postgres_container
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: cloudbeaver_container
    restart: always
    ports:
      - "8978:8978"
    depends_on:
      - mysql-db
      - postgres-db

volumes:
  mysql_data:
  postgres_data: